<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="#f9fafb"/>
  
  <!-- Logo -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="#E8380D"/>
  <text x="112" y="122" font-family="Arial" font-size="36" font-weight="800" fill="white" text-anchor="middle">P</text>
  
  <!-- Title -->
  <text x="80" y="280" font-family="Arial" font-size="72" font-weight="800" fill="#111827">Every PDF tool.</text>
  <text x="80" y="368" font-family="Arial" font-size="72" font-weight="800" fill="#E8380D">Completely free.</text>
  
  <!-- Subtitle -->
  <text x="80" y="440" font-family="Arial" font-size="28" fill="#9ca3af">Merge · Split · Compress · Convert · Protect</text>
  
  <!-- Badges -->
  <rect x="80" y="500" width="200" height="44" rx="22" fill="#FEF2F2" stroke="#fecaca" stroke-width="1"/>
  <text x="180" y="527" font-family="Arial" font-size="16" font-weight="700" fill="#DC2626" text-anchor="middle">✓ No sign up</text>
  
  <rect x="296" y="500" width="220" height="44" rx="22" fill="#F0FDF4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="406" y="527" font-family="Arial" font-size="16" font-weight="700" fill="#16A34A" text-anchor="middle">✓ Files stay private</text>
  
  <rect x="532" y="500" width="200" height="44" rx="22" fill="#EFF6FF" stroke="#bfdbfe" stroke-width="1"/>
  <text x="632" y="527" font-family="Arial" font-size="16" font-weight="700" fill="#2563EB" text-anchor="middle">✓ 100% free</text>
  
  <!-- By Dajai Studio -->
